<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulación Educativa</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle,#1a2a6c,#000);
    color:white;
    text-align:center;
    margin:0;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

button{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    background: linear-gradient(45deg,#00f260,#0575e6);
    color:white;
}

button:hover{
    transform:scale(1.05);
}

input{
    padding:12px;
    border-radius:10px;
    border:none;
    width:80%;
}

.hidden{display:none;}

.podium{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:10px;
    margin-top:20px;
}

.podium div{
    width:90px;
    padding:10px;
    border-radius:10px;
}

.first{height:120px; background:gold; color:black;}
.second{height:90px; background:silver; color:black;}
.third{height:70px; background:#cd7f32; color:white;}
</style>
</head>

<body>

<div class="container">

<h1>🎮 Simulación Educativa</h1>

<div id="intro">
<input id="nameInput" placeholder="Escribe tu nombre">
<button onclick="start()">🚀 Comenzar</button>
</div>

<div id="quiz" class="hidden">
<h2 id="question"></h2>
<div id="options"></div>
<p id="feedback"></p>
<button id="nextBtn" class="hidden" onclick="nextQ()">Siguiente</button>
</div>

<div id="result" class="hidden">
<h2>🏁 Resultado</h2>
<p id="scoreText"></p>
</div>

<div id="ranking"></div>

</div>

<!-- ✅ Firebase SIN import (correcto para GitHub) -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 TU CONFIG (YA CORRECTA)
const firebaseConfig = {
  apiKey: "AIzaSyBlgHkKd24UfefaOyH-2f0KhGs4N--u7QU",
  authDomain: "reto-academico-31e18.firebaseapp.com",
  databaseURL: "https://reto-academico-31e18-default-rtdb.firebaseio.com",
  projectId: "reto-academico-31e18",
  storageBucket: "reto-academico-31e18.firebasestorage.app",
  messagingSenderId: "354546453022",
  appId: "1:354546453022:web:a265a7e9cf3a8eb4a27c0f"
};

// 🔥 INICIALIZAR
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🎮 PREGUNTAS
const quiz = [
["🏫 ¿Qué permite que una escuela funcione como comunidad?",["Infraestructura","Plan de estudios","Gestión y liderazgo"],2],
["👤 Habilidad clave del líder moderno",["Autoridad","Conocimiento","Inteligencia emocional"],2],
["📋 Qué orienta decisiones escolares",["Normas","Actividades","Instrumentos de gestión"],2],
["📘 Documento que guía la escuela",["Programa","Plan","PEI"],2],
["⚖️ Documento de normas",["Proyecto","Manual","Reglamento Interno"],2]
];

let i=0, score=0, startTime, name="";

// 🚀 INICIAR
function start(){
    name=document.getElementById("nameInput").value.trim();
    if(!name){
        alert("Escribe tu nombre");
        return;
    }

    startTime=new Date();

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    load();
}

// 📌 CARGAR PREGUNTA
function load(){
    let q=quiz[i];
    document.getElementById("question").innerText=q[0];

    let html="";
    q[1].forEach((opt,idx)=>{
        html+=`<button onclick="answer(${idx})">${opt}</button>`;
    });

    document.getElementById("options").innerHTML=html;
    document.getElementById("feedback").innerText="";
}

// ✅ RESPUESTA
function answer(idx){
    if(idx===quiz[i][2]){
        score++;
        document.getElementById("feedback").innerText="✅ Correcto";
    }else{
        document.getElementById("feedback").innerText="❌ Incorrecto";
    }

    document.querySelectorAll("#options button").forEach(b=>b.disabled=true);
    document.getElementById("nextBtn").classList.remove("hidden");
}

// ➡️ SIGUIENTE
function nextQ(){
    i++;
    document.getElementById("nextBtn").classList.add("hidden");

    if(i<quiz.length){
        load();
    }else{
        finish();
    }
}

// 🏁 FINAL
function finish(){
    let time=Math.floor((new Date()-startTime)/1000);

    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    document.getElementById("scoreText").innerHTML=
    `👤 ${name}<br>🎯 ${score}/5<br>⏱️ ${time}s`;

    // 🔥 GUARDAR
    db.ref("ranking").push({
        nombre:name,
        puntaje:score,
        tiempo:time
    });
}

// 🏆 RANKING EN VIVO
db.ref("ranking").on("value",snap=>{
    let data=snap.val();
    if(!data) return;

    let arr=Object.values(data);

    arr.sort((a,b)=> b.puntaje===a.puntaje ? a.tiempo-b.tiempo : b.puntaje-a.puntaje);

    let top=arr.slice(0,3);

    let html="<h2>🏆 PODIUM EN VIVO</h2><div class='podium'>";

    if(top[1]) html+=`<div class='second'>🥈<br>${top[1].nombre}</div>`;
    if(top[0]) html+=`<div class='first'>🥇<br>${top[0].nombre}</div>`;
    if(top[2]) html+=`<div class='third'>🥉<br>${top[2].nombre}</div>`;

    html+="</div>";

    document.getElementById("ranking").innerHTML=html;
});

</script>

</body>
</html>
